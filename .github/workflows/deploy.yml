name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend and API
        run: npm run build

  deploy-notes:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment handoff
        run: |
          echo "Frontend: deploy dist/ to Vercel or Netlify."
          echo "API: deploy dist-api/ with npm start on Render/Railway/Fly."
          echo "Set AI_PROVIDER and provider API keys in the hosting dashboard."
